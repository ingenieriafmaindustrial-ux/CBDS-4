<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#1E1B6E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CBS4">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Condominio Bosques del Sur 4</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@300;400;500;600;700&display=swap');
:root{
--navy:#1E1B6E;--navy-light:#2D2A8E;--navy-dark:#141252;
--green:#4A7C59;--green-light:#6BA882;--green-pale:#E8F4EC;
--cream:#F8F7FF;--white:#FFFFFF;
--gray-100:#F3F3FA;--gray-200:#E8E8F0;--gray-400:#9090B0;--gray-700:#3D3D6B;
--danger:#E05252;--warning:#E0A025;
--bg:var(--cream);--surface:#FFFFFF;--surface2:#F3F3FA;--border:#E8E8F0;
--text:#141252;--text2:#3D3D6B;--text3:#9090B0;
--topbar-bg:#1E1B6E;
--shadow:0 4px 24px rgba(30,27,110,.10);--shadow-sm:0 2px 8px rgba(30,27,110,.07);
}
[data-theme="dark"]{
--bg:#0F0E1F;--surface:#1A1930;--surface2:#221F3A;--border:#2E2B50;
--text:#E8E6FF;--text2:#B0ACDC;--text3:#706C9A;
--topbar-bg:#0A0919;
--shadow:0 4px 24px rgba(0,0,0,.4);--shadow-sm:0 2px 8px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
background:linear-gradient(135deg,#0A0919 0%,#1E1B6E 50%,#2D2A8E 100%);}
.login-card{background:var(--surface);border-radius:24px;padding:40px 32px;width:380px;
max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;border:1px solid var(--border);}
.logo-circ{width:100px;height:100px;margin:0 auto 14px;border-radius:50%;overflow:hidden;border:3px solid var(--navy);}
.logo-circ img{width:100%;height:100%;object-fit:cover;}
.login-title{font-family:'Playfair Display',serif;color:var(--navy);font-size:18px;font-weight:700;margin-bottom:4px;}
[data-theme="dark"] .login-title{color:#A8A4FF;}
.login-sub{color:var(--text3);font-size:13px;margin-bottom:28px;}
.login-label{display:block;text-align:left;font-size:11px;font-weight:700;color:var(--text);
text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.login-input{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;
font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border .2s;
margin-bottom:14px;background:var(--surface2);color:var(--text);}
.login-input:focus{border-color:var(--navy);}
[data-theme="dark"] .login-input:focus{border-color:#6B67D4;}
.login-btn{width:100%;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:10px;
font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;}
.login-btn:hover{background:var(--navy-light);}
.login-error{color:var(--danger);font-size:13px;margin-top:8px;min-height:18px;}
.transp-link{margin-top:18px;}
.transp-link a{color:var(--green);font-size:13px;text-decoration:none;font-weight:600;}
#app{display:none;min-height:100vh;flex-direction:column;}
.topbar{background:var(--topbar-bg);color:#fff;padding:0 16px;display:flex;align-items:center;
height:56px;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.2);position:sticky;top:0;z-index:100;}
.topbar-logo{width:34px;height:34px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.topbar-logo img{width:100%;height:100%;object-fit:cover;}
.topbar-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;flex:1;}
.topbar-sub{font-size:10px;color:rgba(255,255,255,.65);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.year-sel{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);color:#fff;
padding:5px 10px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:12px;outline:none;cursor:pointer;}
.icon-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;
width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;
justify-content:center;font-size:16px;transition:background .2s;}
.icon-btn:hover{background:rgba(255,255,255,.2);}
.logout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;
padding:5px 12px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:12px;cursor:pointer;}
.badge-admin{background:var(--green);color:#fff;font-size:9px;font-weight:700;padding:3px 7px;border-radius:20px;text-transform:uppercase;}
.badge-view{background:var(--gray-400);color:#fff;font-size:9px;font-weight:700;padding:3px 7px;border-radius:20px;text-transform:uppercase;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;margin-right:2px;}
.sync-dot.off{background:#f87171;}
.sync-dot.loading{background:#facc15;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.transp-banner{background:linear-gradient(135deg,var(--green),var(--green-light));color:#fff;
padding:10px 16px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;}
.app-body{display:flex;flex:1;}
.sidebar{width:200px;min-height:calc(100vh - 56px);background:var(--surface);
border-right:1px solid var(--border);padding:14px 0;flex-shrink:0;
position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:9px;padding:11px 16px;cursor:pointer;
color:var(--text2);font-size:13px;font-weight:600;transition:all .15s;
border-left:3px solid transparent;margin-bottom:1px;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--bg);color:var(--navy);border-left-color:var(--navy);}
[data-theme="dark"] .nav-item.active{color:#A8A4FF;border-left-color:#A8A4FF;}
.nav-sep{height:1px;background:var(--border);margin:10px 14px;}
.nav-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:6px 16px 3px;font-weight:700;}
.main{flex:1;padding:20px;overflow-y:auto;max-height:calc(100vh - 56px);}
.month-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px;}
.month-tab{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;
border:2px solid var(--border);color:var(--text3);transition:all .15s;background:var(--surface);}
.month-tab:hover{border-color:var(--navy);color:var(--navy);}
.month-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
[data-theme="dark"] .month-tab.active{background:#6B67D4;border-color:#6B67D4;}
.card{background:var(--surface);border-radius:14px;padding:18px;box-shadow:var(--shadow-sm);border:1px solid var(--border);}
.card-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--navy);margin-bottom:14px;font-weight:600;}
[data-theme="dark"] .card-title{color:#A8A4FF;}
.page-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--navy);margin-bottom:4px;font-weight:700;}
[data-theme="dark"] .page-title{color:#A8A4FF;}
.page-sub{color:var(--text3);font-size:13px;margin-bottom:20px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border-radius:14px;padding:16px;box-shadow:var(--shadow-sm);
border:1px solid var(--border);border-top:4px solid transparent;}
.stat-card.blue{border-top-color:var(--navy);}
.stat-card.green{border-top-color:var(--green);}
.stat-card.red{border-top-color:var(--danger);}
.stat-card.orange{border-top-color:var(--warning);}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:6px;}
.stat-value{font-size:22px;font-weight:700;color:var(--text);line-height:1.1;}
.stat-value.small{font-size:16px;}
.stat-meta{font-size:11px;color:var(--text3);margin-top:3px;}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
canvas{max-height:200px;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:9px 12px;background:var(--surface2);color:var(--text);
font-size:10px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-green{background:var(--green-pale);color:var(--green);}
[data-theme="dark"] .badge-green{background:rgba(74,124,89,.25);color:#6BA882;}
.badge-red{background:#FDEAEA;color:var(--danger);}
[data-theme="dark"] .badge-red{background:rgba(224,82,82,.2);color:#F08080;}
.badge-orange{background:#FEF4E4;color:var(--warning);}
[data-theme="dark"] .badge-orange{background:rgba(224,160,37,.2);color:#E0B55A;}
.badge-navy{background:#EEEEFF;color:var(--navy);}
[data-theme="dark"] .badge-navy{background:rgba(107,103,212,.25);color:#A8A4FF;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:9px;
font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--navy-light);}
[data-theme="dark"] .btn-primary{background:#6B67D4;}
[data-theme="dark"] .btn-primary:hover{background:#8480E0;}
.btn-success{background:var(--green);color:#fff;}
.btn-success:hover{background:var(--green-light);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-warning{background:var(--warning);color:#fff;}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:7px;}
.btn-outline{background:transparent;border:2px solid var(--navy);color:var(--navy);}
[data-theme="dark"] .btn-outline{border-color:#6B67D4;color:#A8A4FF;}
.btn-ghost{background:transparent;border:2px solid var(--border);color:var(--text2);}
.form-row{display:grid;gap:12px;margin-bottom:12px;}
.form-row-2{grid-template-columns:1fr 1fr;}
label.fl{display:block;font-size:11px;font-weight:700;color:var(--text);
text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
input.fi,select.fi,textarea.fi{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:9px;
font-family:'Nunito',sans-serif;font-size:13px;outline:none;transition:border .2s;
background:var(--surface2);color:var(--text);}
input.fi:focus,select.fi:focus,textarea.fi:focus{border-color:var(--navy);}
[data-theme="dark"] input.fi:focus,[data-theme="dark"] select.fi:focus{border-color:#6B67D4;}
.depto-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
.depto-cell{background:var(--surface2);border-radius:9px;padding:10px 6px;text-align:center;
transition:all .15s;border:2px solid transparent;}
.depto-cell.clickable{cursor:pointer;}
.depto-cell.clickable:hover{border-color:var(--navy);}
.depto-cell.paid{background:var(--green-pale);border-color:var(--green);}
[data-theme="dark"] .depto-cell.paid{background:rgba(74,124,89,.2);border-color:var(--green);}
.depto-num{font-size:15px;font-weight:700;color:var(--navy);}
[data-theme="dark"] .depto-num{color:#A8A4FF;}
.depto-name{font-size:9px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.depto-status{font-size:9px;font-weight:700;margin-top:3px;}
.paid .depto-status{color:var(--green);}
.depto-cell:not(.paid) .depto-status{color:var(--danger);}
.prog-bar{background:var(--surface2);border-radius:99px;height:10px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .5s;}
.prog-fill.green{background:var(--green);}
.file-drop{border:2px dashed var(--border);border-radius:10px;padding:14px;text-align:center;
cursor:pointer;transition:border .2s;color:var(--text3);font-size:12px;}
.file-drop:hover{border-color:var(--navy);}
.file-preview{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);
border-radius:8px;font-size:12px;margin-top:8px;}
.file-preview .file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;
display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:18px;padding:28px;width:480px;
max-width:95vw;max-height:90vh;overflow-y:auto;
box-shadow:0 24px 60px rgba(0,0,0,.25);border:1px solid var(--border);}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--navy);margin-bottom:18px;}
[data-theme="dark"] .modal-title{color:#A8A4FF;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;
border-radius:10px;font-size:13px;font-weight:600;z-index:9999;
box-shadow:var(--shadow);transform:translateY(100px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:var(--green);}
.toast.error{background:var(--danger);}
.switch{position:relative;width:44px;height:24px;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:24px;transition:.3s;}
.slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;
background:white;border-radius:50%;transition:.3s;}
input:checked+.slider{background:var(--navy);}
[data-theme="dark"] input:checked+.slider{background:#6B67D4;}
input:checked+.slider:before{transform:translateX(20px);}
.donut-wrap{position:relative;width:160px;height:160px;margin:0 auto;}
.donut-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut-pct{font-size:26px;font-weight:700;color:var(--text);}
.donut-sub{font-size:10px;color:var(--text3);}
.config-section-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;
padding-bottom:8px;border-bottom:1px solid var(--border);}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
background:var(--surface2);border-radius:8px;margin-bottom:6px;font-size:13px;}
.share-box{background:var(--surface2);border-radius:10px;padding:14px;border:1px solid var(--border);}
.share-url{font-family:monospace;font-size:11px;color:var(--navy);word-break:break-all;margin:8px 0;
background:var(--surface);padding:8px;border-radius:6px;border:1px solid var(--border);}
[data-theme="dark"] .share-url{color:#A8A4FF;}
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);
border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:#fff;font-size:15px;font-weight:600;}
.mt-16{margin-top:16px;}.mb-16{margin-bottom:16px;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.hamburger{display:none;background:none;border:none;cursor:pointer;
padding:6px;color:#fff;font-size:26px;line-height:1;margin-right:4px;}
.drawer-overlay{
position:fixed;inset:0;background:rgba(0,0,0,0.55);
z-index:9000;opacity:0;pointer-events:none;
transition:opacity .25s;
}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{
position:fixed;top:0;left:0;bottom:0;width:280px;
background:var(--surface);
z-index:9001;
transform:translateX(-100%);
transition:transform .28s cubic-bezier(.4,0,.2,1);
display:flex;flex-direction:column;
box-shadow:4px 0 24px rgba(0,0,0,.3);
}
.drawer.open{transform:translateX(0);}
.drawer-header{background:var(--topbar-bg);padding:20px 16px 16px;
display:flex;align-items:center;gap:12px;flex-shrink:0;}
.drawer-logo{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.drawer-logo img{width:100%;height:100%;object-fit:cover;}
.drawer-title{color:#fff;font-family:'Playfair Display',serif;font-size:13px;font-weight:700;line-height:1.3;}
.drawer-sub{color:rgba(255,255,255,.6);font-size:10px;margin-top:2px;}
.drawer-close{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;
width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;
align-items:center;justify-content:center;flex-shrink:0;}
.drawer-nav{flex:1;overflow-y:auto;padding:10px 0;}
.drawer-nav-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;
color:var(--text3);padding:10px 16px 4px;font-weight:700;}
.drawer-nav-item{display:flex;align-items:center;gap:12px;padding:13px 16px;
cursor:pointer;color:var(--text2);font-size:14px;font-weight:600;
transition:all .15s;border-left:3px solid transparent;}
.drawer-nav-item:hover{background:var(--surface2);color:var(--text);}
.drawer-nav-item.active{background:var(--bg);color:var(--navy);border-left-color:var(--navy);}
[data-theme="dark"] .drawer-nav-item.active{color:#A8A4FF;border-left-color:#A8A4FF;}
.drawer-nav-sep{height:1px;background:var(--border);margin:8px 14px;}
.drawer-nav-icon{font-size:20px;width:26px;text-align:center;}
.drawer-footer{padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0;}
.drawer-footer-info{font-size:12px;color:var(--text3);margin-bottom:10px;}
.drawer-logout{width:100%;padding:10px;background:var(--danger);color:#fff;border:none;
border-radius:9px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
@media(max-width:700px){
.stats-grid{grid-template-columns:1fr 1fr;}
.charts-grid{grid-template-columns:1fr;}
.depto-grid{grid-template-columns:repeat(3,1fr);}
.sidebar{display:none;}
.hamburger{display:flex;align-items:center;justify-content:center;}
.main{padding:14px;padding-bottom:24px;}
.form-row-2{grid-template-columns:1fr;}
.stat-value.small{font-size:14px;}
.topbar-sub{display:none;}
}
@media print{
.sidebar,.topbar,.bottom-nav,.transp-banner,.btn,.month-tabs{display:none!important;}
.main{padding:0;max-height:none;}.app-body{display:block;}
body{background:white;color:black;}
.card,.stat-card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;}
}
@media(max-width:700px){
.stats-grid{grid-template-columns:1fr 1fr;}
.charts-grid{grid-template-columns:1fr;}
.depto-grid{grid-template-columns:repeat(4,1fr);}
.sidebar{display:none;}
.bottom-nav{display:block;}
.main{padding:14px;padding-bottom:80px;}
.form-row-2{grid-template-columns:1fr;}
.stat-value.small{font-size:14px;}
}
</style>
</head>
<body>
<div id="loading-overlay" class="loading-overlay">
<div class="spinner"></div>
<div class="loading-text">Conectando con Firebase...</div>
</div>
<div id="login-screen" style="display:none">
<div class="login-card">
<div class="logo-circ"><img id="logo-login" alt="Logo"/></div>
<div class="login-title">CONDOMINIO<br>BOSQUES DEL SUR 4</div>
<div class="login-sub" id="login-sub-text">Panel de Administración</div>
<div id="login-form-area">
<label class="login-label">Usuario</label>
<input class="login-input" id="usr" type="text" placeholder="admin1" onkeydown="if(event.key==='Enter')doLogin()"/>
<label class="login-label">Contraseña</label>
<input class="login-input" id="pwd" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
<button class="login-btn" onclick="doLogin()">Ingresar al Sistema</button>
</div>
<div id="biometric-area" style="display:none;margin-bottom:14px;">

function saveData(){
db.ref('cbs4').set(appData).catch(e => showToast('Error al guardar: '+e.message,'error'));
}

function fmt(n){return new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0}).format(n);}
function mkKey(y,m){return `${y}-${String(m+1).padStart(2,'0')}`;}

function showToast(msg,type=''){
const t=document.getElementById('toast-el');
t.textContent=msg; t.className=`toast ${type}`;
setTimeout(()=>t.classList.add('show'),10);
setTimeout(()=>t.classList.remove('show'),2800);
}

function closeModal(){document.getElementById('modal-area').innerHTML='';}

function getGC(anio,mes){
const key=mkKey(anio,mes);
const hist=(appData.gastoComunHistorial||[{desde:'2022-01',valor:DEFAULT_GC}])
.filter(h=>h.desde<=key).sort((a,b)=>b.desde.localeCompare(a.desde));
return hist.length>0?hist[0].valor:DEFAULT_GC;
}

function toggleTheme(){
state.theme=state.theme==='light'?'dark':'light';
document.documentElement.setAttribute('data-theme',state.theme);
document.getElementById('theme-btn').textContent=state.theme==='dark'?'☀️':'🌙';
if(!appData.configuracion)appData.configuracion={};
appData.configuracion.tema=state.theme;
saveData();
}

function formatPeriodo(key){
const [y,m]=key.split('-');
return `${MESES[parseInt(m)-1]} ${y}`;
}

const SESSION_KEY = 'cbs4_session';
const SESSION_DAYS = 7;

function saveSession(usuario) { localStorage.setItem(SESSION_KEY, JSON.stringify({usuario, ts: Date.now()})); }
function clearSession() { localStorage.removeItem(SESSION_KEY); localStorage.removeItem('cbs4_biometric_enabled'); }

function checkSession() {
try {
const s = JSON.parse(localStorage.getItem(SESSION_KEY));
if (!s) return null;
const days = (Date.now() - s.ts) / (1000 * 60 * 60 * 24);
if (days > SESSION_DAYS) { clearSession(); return null; }
return s.usuario;
} catch(e) { return null; }
}

function isBiometricAvailable() { return window.PublicKeyCredential && typeof PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable === 'function'; }
async function biometricAvailable() { if (!isBiometricAvailable()) return false; try { return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); } catch(e) { return false; } }

async function registerBiometric(usuario) {
try {
const challenge = new Uint8Array(32); crypto.getRandomValues(challenge);
const userId = new TextEncoder().encode(usuario);
await navigator.credentials.create({ publicKey: { challenge, rp: { name: 'Bosques del Sur 4', id: location.hostname }, user: { id: userId, name: usuario, displayName: usuario }, pubKeyCredParams: [{ alg: -7, type: 'public-key' }], authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' }, timeout: 60000 } });
localStorage.setItem('cbs4_biometric_enabled', usuario); showToast('Huella registrada ✓','success'); return true;
} catch(e) { console.log('Biometric register error:', e); return false; }
}

async function verifyBiometric() {
const usuario = localStorage.getItem('cbs4_biometric_enabled'); if (!usuario) return null;
try {
const challenge = new Uint8Array(32); crypto.getRandomValues(challenge);
await navigator.credentials.get({ publicKey: { challenge, timeout: 60000, userVerification: 'required', rpId: location.hostname } });
return usuario;
} catch(e) { console.log('Biometric verify error:', e); return null; }
}

async function doLogin() {
const u = document.getElementById('usr').value.trim(); const p = document.getElementById('pwd').value;
if (ADMINS.some(a => a.u === u && a.p === p)) {
saveSession(u); state.loggedIn = true; state.isTransparencia = false; showApp();
const bioOk = await biometricAvailable(); const bioEnabled = localStorage.getItem('cbs4_biometric_enabled');
if (bioOk && !bioEnabled) setTimeout(() => offerBiometric(u), 800);
} else { document.getElementById('login-err').textContent = 'Credenciales incorrectas.'; }
}

function offerBiometric(usuario) {
document.getElementById('modal-area').innerHTML = `<div class="modal-overlay open"><div class="modal" style="text-align:center;"><div style="font-size:48px;margin-bottom:12px;">👆</div><div class="modal-title" style="text-align:center;">¿Activar acceso con huella?</div><p style="font-size:13px;color:var(--text3);margin-bottom:20px;">La próxima vez podrás entrar usando tu huella digital.</p><div style="display:flex;gap:10px;justify-content:center;"><button class="btn btn-primary" onclick="activarBiometric('${usuario}')">👆 Activar huella</button><button class="btn btn-ghost" onclick="closeModal()">Ahora no</button></div></div></div>`;
}

async function activarBiometric(usuario) { closeModal(); showToast('Escanea tu huella...',''); await registerBiometric(usuario); }

async function loginConHuella() {
const usuario = localStorage.getItem('cbs4_biometric_enabled'); if (!usuario) return;
showToast('Verifica tu identidad...',''); const result = await verifyBiometric();
if (result) { saveSession(result); state.loggedIn = true; state.isTransparencia = false; showApp(); showToast('Bienvenido ' + result + ' ✓','success'); }
else { showToast('Verificación fallida','error'); }
}

function enterTransparencia() { state.isTransparencia = true; state.loggedIn = false; state.currentView = 'reportes'; showApp(); }
function backToLogin() { state.isTransparencia = false; state.loggedIn = false; document.getElementById('app').style.display = 'none'; document.getElementById('login-screen').style.display = 'flex'; renderLoginScreen(); }
function doLogout() { clearSession(); backToLogin(); }

function showApp(){

document.getElementById('transp-banner-el').style.display=state.isTransparencia?'flex':'none';
document.getElementById('badge-el').className=state.isTransparencia?'badge-view':'badge-admin';
document.getElementById('badge-el').textContent=state.isTransparencia?'Solo Lectura':'Admin';

const ys=document.getElementById('year-sel'); ys.innerHTML=YEARS.map(y=>`<option value="${y}" ${y===state.currentYear?'selected':''}>${y}</option>`).join('');

const VIEWS_ADMIN=[
{id:'dashboard',icon:'🏠',label:'Dashboard'},
{id:'gastoComun',icon:'💳',label:'Gasto Común'},
{id:'departamentos',icon:'🏘',label:'Departamentos'},
{id:'ingresosExtra',icon:'➕',label:'Ingresos Extra'},
{id:'egresos',icon:'💸',label:'Egresos'},
{id:'reportes',icon:'📊',label:'Transparencia'},

{id:'formularios',icon:'📝',label:'Formulario'}
];

function getViews(){return state.isTransparencia?VIEWS_TRANSP:VIEWS_ADMIN;}

function renderSidebar(){

document.getElementById('sidebar').innerHTML='<div class="nav-label">Menú</div>'+
getViews().map(v=>`<div class="nav-item ${state.currentView===v.id?'active':''}" onclick="goTo('${v.id}')">${v.icon} ${v.label}</div>`).join('');
} catch(e) { console.error('Sidebar render error:', e); }

function renderBNav(){ renderDrawerNav(); }

function renderDrawerNav(){

html += navDrawerItem('reportes','📊','Transparencia'); html += navDrawerItem('config','⚙️','Configuración');
html += navDrawerItem('formularios','📝','Formulario');
} else { html += '<div class="drawer-nav-label">Vista Transparencia</div>'; html += navDrawerItem('reportes','📊','Reporte'); }

const footerEl = document.getElementById('drawer-footer');
if(footerEl){
if(isAdmin) footerEl.innerHTML = `<div class="drawer-footer-info">Sesión activa · Admin</div><button class="drawer-logout" onclick="doLogout();closeDrawer()">Cerrar Sesión</button>`;
else footerEl.innerHTML = `<div class="drawer-footer-info">Vista Residentes · Solo lectura</div><button class="drawer-logout" style="background:var(--navy);" onclick="backToLogin();closeDrawer()">← Volver al Login</button>`;
}
const subEl = document.getElementById('drawer-sub'); if(subEl) subEl.textContent = isAdmin ? 'Panel de Administración' : 'Vista Transparencia';
} catch(e) { console.error('Drawer render error:', e); }

function navDrawerItem(id, icon, label){ return `<div class="drawer-nav-item ${state.currentView===id?'active':''}" onclick="goTo('${id}');closeDrawer()"><span class="drawer-nav-icon">${icon}</span>${label}</div>`; }

function openDrawer(){
try {
const overlay = document.getElementById('drawer-overlay'); const drawer = document.getElementById('drawer'); const dLogo = document.getElementById('drawer-logo');
if(!overlay || !drawer){ console.error('Drawer elements not found'); return; }
if(dLogo) dLogo.src = LOGO_SRC; renderDrawerNav(); overlay.classList.add('open'); drawer.classList.add('open'); document.body.style.overflow = 'hidden';
} catch(e){ console.error('openDrawer error:', e); }
}

function closeDrawer(){ const overlay = document.getElementById('drawer-overlay'); const drawer = document.getElementById('drawer'); if(overlay) overlay.classList.remove('open'); if(drawer) drawer.classList.remove('open'); document.body.style.overflow = ''; }

function goTo(v){
state.currentView=v;
renderSidebar();
renderBNav();
renderView();
window.scrollTo(0,0);
setTimeout(()=>{window.scrollTo(0,0);},100);
}

function changeYear(y){state.currentYear=parseInt(y);renderView();}
function setMonth(m){state.currentMonth=m;renderView();}

function monthTabs(){ 
return '<div class="month-tabs">'+MESES.map((m,i)=>`<div class="month-tab ${i===state.currentMonth?'active':''}" onclick="setMonth(${i})">${m.substring(0,3)}</div>`).join('')+'</div>'; 
}

let charts={};

function killCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

function renderView(){
killCharts(); 
const el=document.getElementById('main-content');
if(!el) return;
const v=state.currentView;
try {
if(v==='dashboard') el.innerHTML=vDashboard();
else if(v==='gastoComun') el.innerHTML=vGastoComun();
else if(v==='departamentos') el.innerHTML=vDepartamentos();
else if(v==='ingresosExtra') el.innerHTML=vIngresosExtra();
else if(v==='egresos') el.innerHTML=vEgresos();
else if(v==='reportes') el.innerHTML=vReportes();
else if(v==='config') el.innerHTML=vConfig();
else if(v==='formularios') el.innerHTML=vFormularios();
else el.innerHTML='<div style="padding:20px;">Vista no encontrada</div>';
} catch(e) {
console.error('View render error:', e);
el.innerHTML='<div style="padding:20px;color:var(--danger)">Error al cargar la vista. Recarga la página.</div>';
}
setTimeout(drawCharts, 100);
}

function vDashboard(){
const {currentYear,currentMonth}=state;
const key=mkKey(currentYear,currentMonth);
const gc=getGC(currentYear,currentMonth);
const pagos=appData.pagos[key]||{};
const pagados=Object.values(pagos).filter(Boolean).length;
const fijosMes = (appData.gastosFijos && appData.gastosFijos[key]) ? appData.gastosFijos[key] : [];
const fijos = fijosMes.reduce((s,g)=>s+g.monto,0);
const vars=(appData.gastosVariables||[]).filter(g=>g.anio===currentYear&&g.mes===currentMonth).reduce((s,g)=>s+g.monto,0);
const extras=(appData.ingresosExtra||[]).filter(g=>g.anio===currentYear&&g.mes===currentMonth).reduce((s,g)=>s+g.monto,0);
const tI=pagados*gc+extras,tE=fijos+vars,bal=tI-tE;

return `<div class="page-title">Dashboard General</div><div class="page-sub">Año ${currentYear} — ${MESES[currentMonth]} | GC: ${fmt(gc)}/depto</div>${monthTabs()}
<div class="stats-grid">
<div class="stat-card green"><div class="stat-label">Ingresos</div><div class="stat-value small">${fmt(tI)}</div><div class="stat-meta">GC + Extras</div></div>
<div class="stat-card red"><div class="stat-label">Egresos</div><div class="stat-value small">${fmt(tE)}</div><div class="stat-meta">Fijos + Variables</div></div>
<div class="stat-card ${bal>=0?'green':'red'}"><div class="stat-label">Balance</div><div class="stat-value small" style="color:${bal>=0?'var(--green)':'var(--danger)'}">${fmt(bal)}</div></div>
<div class="stat-card orange"><div class="stat-label">Al Día</div><div class="stat-value">${pagados}<span style="font-size:13px;color:var(--text3)">/${TOTAL_DEPTOS}</span></div></div>
</div>
<div class="charts-grid">
<div class="card"><div class="card-title">Ingresos vs Egresos</div><canvas id="ch-bar"></canvas></div>
<div class="card"><div class="card-title">Depto. Pagados (Global)</div><canvas id="ch-deptos"></canvas></div>
</div>
<div class="card"><div class="card-title">Evolución Anual ${currentYear}</div><canvas id="ch-line"></canvas></div>`;
}

function vGastoComun(){
const {currentYear,currentMonth}=state; const key=mkKey(currentYear,currentMonth); const gc=getGC(currentYear,currentMonth);
const pagos=appData.pagos[key]||{}; const pagados=Object.values(pagos).filter(Boolean).length; const isAdmin=!state.isTransparencia;
return `<div class="page-title">Gasto Común</div><div class="page-sub">Valor período: ${fmt(gc)} por departamento</div>${monthTabs()}
<div class="stats-grid"><div class="stat-card green"><div class="stat-label">Pagados</div><div class="stat-value">${pagados}</div><div class="stat-meta">${fmt(pagados*gc)}</div></div>
<div class="stat-card red"><div class="stat-label">Pendientes</div><div class="stat-value">${TOTAL_DEPTOS-pagados}</div><div class="stat-meta">${fmt((TOTAL_DEPTOS-pagados)*gc)}</div></div>
<div class="stat-card blue"><div class="stat-label">Recaudado</div><div class="stat-value small">${fmt(pagados*gc)}</div></div>
<div class="stat-card orange"><div class="stat-label">Meta</div><div class="stat-value small">${fmt(TOTAL_DEPTOS*gc)}</div></div></div>
<div class="card mb-16"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span style="font-weight:700;font-size:13px">Recaudación ${MESES[currentMonth]}</span><span style="font-size:13px;color:var(--text3)">${pagados}/${TOTAL_DEPTOS} dptos</span></div>
<div class="prog-bar"><div class="prog-fill green" style="width:${Math.round(pagados/TOTAL_DEPTOS*100)}%"></div></div><div style="font-size:11px;color:var(--text3);text-align:right;margin-top:4px">${Math.round(pagados/TOTAL_DEPTOS*100)}%</div></div>
<div class="card"><div class="card-title">Estado por Departamento${isAdmin?' <span style="font-size:11px;color:var(--text3)">— clic para marcar/desmarcar</span>':''}</div>
<div class="depto-grid">${(appData.departamentos||[]).map(d=>{const paid=pagos[d.id]===true;return `<div class="depto-cell ${paid?'paid':''} ${isAdmin?'clickable':''}" ${isAdmin?`onclick="togglePago('${key}',${d.id})"`:''}><div class="depto-num">${d.numero}</div><div class="depto-name">${d.representante||'—'}</div><div class="depto-status">${paid?'✓ Pagado':'Pendiente'}</div></div>`;}).join('')}</div></div>`;
}

function togglePago(key,id){
if(!appData.pagos)appData.pagos={}; if(!appData.pagos[key])appData.pagos[key]={};
const nowPaid = !appData.pagos[key][id]; appData.pagos[key][id] = nowPaid; saveData();
if(nowPaid){ showToast('Pago registrado ✓ — generando voucher...','success'); setTimeout(()=>generarVoucher(key, id), 400); } else { showToast('Pago removido',''); }
}

function vDepartamentos(){

<div class="card"><div class="table-wrap"><table><thead><tr><th>Departamento</th><th>Representante</th><th>Contacto</th><th></th></tr></thead>
<tbody>${(appData.departamentos||[]).map(d=>`<tr><td><strong style="color:var(--navy)">${d.numero}</strong></td><td>${d.representante||'<span style="color:var(--text3)">Sin asignar</span>'}</td><td>${d.contacto||'—'}</td><td><button class="btn btn-primary btn-sm" onclick="openDepto(${d.id})">Editar</button></td></tr>`).join('')}</tbody></table></div></div>`;
}

function openDepto(id){
const d=(appData.departamentos||[]).find(x=>x.id===id);
document.getElementById('modal-area').innerHTML=`<div class="modal-overlay open" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-title">Editar Departamento</div>
<div class="form-row"><div><label class="fl">Número / ID Departamento</label><input class="fi" id="m-num" value="${d.numero}" placeholder="101, A-1, Bodega..."/></div></div>
<div class="form-row"><div><label class="fl">Representante</label><input class="fi" id="m-rep" value="${d.representante}" placeholder="Nombre completo"/></div></div>

function eximirDepto(deptoId, button) {
const row = document.getElementById(`depto-row-${deptoId}`);
const label = row.querySelector('label');
const checkbox = row.querySelector('input[type="checkbox"]');
const isEximido = label.querySelector('.eximido-label');

if (isEximido) {
button.textContent = 'Eximir';
button.classList.remove('btn-outline');
button.classList.add('btn-ghost');
label.style.backgroundColor = '';
const lbl = label.querySelector('.eximido-label');
if (lbl) lbl.remove();
checkbox.disabled = false;
checkbox.checked = false;
} else {
button.textContent = 'Restaurar';
button.classList.add('btn-outline');
button.classList.remove('btn-ghost');
label.style.backgroundColor = '#f0f0f0';
if (!label.querySelector('.eximido-label')) {
const span = document.createElement('span');
span.className = 'eximido-label';
span.style.cssText = 'color:var(--text3);font-size:11px;';
span.textContent = '(Eximido)';
label.insertBefore(span, button);
}
checkbox.disabled = true;
checkbox.checked = false;
}
updatePactoCount();
}

function toggleIngresoFields(){
const tipo = document.getElementById('ni-t').value;
const fieldMonto = document.getElementById('field-monto');
const fieldPacto = document.getElementById('field-pacto');
if(tipo === 'Pacto Cuotas'){
fieldMonto.style.display = 'none';
fieldPacto.style.display = 'block';
} else {
fieldMonto.style.display = 'block';
fieldPacto.style.display = 'none';
}
}

function updatePactoCount(count){
const el = document.getElementById('pacto-count');
if(el) el.textContent = `${count}/18 deptos seleccionados`;
}

function saveIngreso(editId){
const {currentYear,currentMonth}=state;
const desc=document.getElementById('ni-d').value.trim();
const tipo=document.getElementById('ni-t').value;
let monto=0;
let montoUnitario=0;
let departamentosPagados=[];
let departamentosEximidos=[];

if(tipo === 'Pacto Cuotas'){
montoUnitario = parseInt(document.getElementById('ni-m-unit').value)||0;
const checks = document.querySelectorAll('.depto-check:checked');
checks.forEach(c => {
const id = parseInt(c.getAttribute('data-depto-id') || c.value);
departamentosPagados.push(id);
});
const eximidos = document.querySelectorAll('.eximido-label');
eximidos.forEach(el => {
const row = el.closest('.depto-row');
const checkbox = row.querySelector('input[type="checkbox"]');
departamentosEximidos.push(parseInt(checkbox.getAttribute('data-depto-id')));
});
monto = montoUnitario * departamentosPagados.length;
if(departamentosPagados.length === 0){
showToast('Seleccione al menos un departamento','error');
return;
}
} else {
monto = parseInt(document.getElementById('ni-m').value)||0;
}

if(!desc||monto<=0){showToast('Complete los campos','error');return;}
if(!appData.ingresosExtra)appData.ingresosExtra=[];

if(editId){
const idx = appData.ingresosExtra.findIndex(x=>x.id===editId);
if(idx!==-1){
appData.ingresosExtra[idx] = {
...appData.ingresosExtra[idx],
descripcion: desc, tipo: tipo, monto: monto,
montoUnitario: montoUnitario, departamentosPagados: departamentosPagados,
departamentosEximidos: departamentosEximidos
};
}
} else {
appData.ingresosExtra.push({
id:Date.now(), anio:currentYear, mes:currentMonth,
descripcion:desc, tipo:tipo, monto:monto,
montoUnitario:montoUnitario, departamentosPagados:departamentosPagados,
departamentosEximidos:departamentosEximidos
});
}
saveData();closeModal();
renderView();
showToast('Registrado ✓','success');
}

function delIngreso(id){
appData.ingresosExtra=(appData.ingresosExtra||[]).filter(x=>x.id!=id);
saveData();
renderView();
showToast('Eliminado');
}

function saveFijo(key){
const desc=document.getElementById('gf-d').value.trim(); const monto=parseInt(document.getElementById('gf-m').value)||0;
if(!desc||monto<=0){showToast('Complete los campos','error');return;}
const fi=document.getElementById('gf-file');
const push=(archivo)=>{ 
if(!appData.gastosFijos) appData.gastosFijos = {};

appData.gastosFijos[key].push({id:Date.now(),descripcion:desc,monto,archivo});

renderView();
showToast('Gasto fijo agregado ✓','success'); 
};

function delFijo(id, key){

}

function quitarAdjunto(tipo, id, key){
if(!confirm('¿Quitar el comprobante adjunto?')) return;
if(tipo==='fijo'){
if(!appData.gastosFijos || !appData.gastosFijos[key]) return;
const g = appData.gastosFijos[key].find(x=>x.id==id);
if(g) { delete g.archivo; }
} else {
const g=(appData.gastosVariables||[]).find(x=>x.id==id);
if(g) { delete g.archivo; }
}
saveData();
renderView();
showToast('Adjunto quitado ✓','success');
}

function saveFormulario(editId){
const actividad=document.getElementById('fo-act').value.trim();

const tipo=document.getElementById('fo-tipo').value;
const fecha=document.getElementById('fo-fecha').value;
const detalle=document.getElementById('fo-detalle').value.trim();
if(!actividad||monto<=0||!fecha){showToast('Complete los campos requeridos','error');return;}
if(!appData.formularios)appData.formularios=[];
if(editId){
const idx = appData.formularios.findIndex(x=>x.id===editId);
if(idx!==-1){
appData.formularios[idx] = {...appData.formularios[idx], actividad, monto, tipo, fecha, detalle};
}
} else {
appData.formularios.push({id:Date.now(), actividad, monto, tipo, fecha, detalle});
}
saveData();closeModal();
renderView();
showToast('Guardado ✓','success');
}

saveData();
renderView();

}

function descargarFormulario(id){
const f=(appData.formularios||[]).find(x=>x.id===id); if(!f) return;

function generarVoucher(key, deptoId) {
const {currentYear, currentMonth} = state; const gc = getGC(currentYear, currentMonth);
const depto = (appData.departamentos||[]).find(d=>d.id===deptoId); if(!depto) return;
const ahora = new Date(); const fechaStr = ahora.toLocaleDateString('es-CL',{day:'2-digit',month:'long',year:'numeric'});
const horaStr = ahora.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}); const mesStr = MESES[currentMonth] + ' ' + currentYear;
const W = 600, H = 820; const canvas = document.createElement('canvas'); canvas.width = W; canvas.height = H; const ctx = canvas.getContext('2d');
const dibujarVoucher = (dibujarLogo) => {
ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0,0,W,H);
const grad = ctx.createLinearGradient(0,0,W,0); grad.addColorStop(0,'#141252'); grad.addColorStop(1,'#2D2A8E'); ctx.fillStyle = grad; ctx.fillRect(0,0,W,160);
ctx.save(); ctx.beginPath(); ctx.arc(W/2, 90, 50, 0, Math.PI*2); ctx.clip(); dibujarLogo(ctx, W/2, 90, 50); ctx.restore();
ctx.beginPath(); ctx.arc(W/2, 90, 52, 0, Math.PI*2); ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2; ctx.stroke();
ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 15px Nunito, Arial'; ctx.textAlign = 'center'; ctx.fillText('CONDOMINIO BOSQUES DEL SUR 4', W/2, 175);
ctx.fillStyle = '#000000'; ctx.font = 'bold 13px Nunito, Arial'; ctx.fillText('Voucher válido como comprobante de pago', W/2, 195);
ctx.fillStyle = '#4A7C59'; roundRect(ctx, W/2-80, 210, 160, 44, 22); ctx.fill();
ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 20px Nunito, Arial'; ctx.fillText('✓ PAGADO', W/2, 239);
ctx.strokeStyle = '#E8E8F0'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(40,260); ctx.lineTo(W-40,260); ctx.stroke();
let y = 300; sectionTitle(ctx, 'Datos del Departamento', W, y); y += 40;
dataRow(ctx, 'Departamento', depto.numero, W, y); y += 44; dataRow(ctx, 'Representante', depto.representante||'—', W, y); y += 44; dataRow(ctx, 'Contacto', depto.contacto||'—', W, y); y += 50;
ctx.strokeStyle = '#E8E8F0'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(40,y); ctx.lineTo(W-40,y); ctx.stroke(); y += 30;
sectionTitle(ctx, 'Datos del Pago', W, y); y += 40; dataRow(ctx, 'Período', mesStr, W, y); y += 44; dataRow(ctx, 'Monto Gasto Común', fmt(gc), W, y); y += 44;
dataRow(ctx, 'Fecha de Pago', fechaStr, W, y); y += 44; dataRow(ctx, 'Hora', horaStr, W, y); y += 50;
ctx.strokeStyle = '#E8E8F0'; ctx.beginPath(); ctx.moveTo(40,y); ctx.lineTo(W-40,y); ctx.stroke(); y += 30;
ctx.fillStyle = '#9090B0'; ctx.font = '11px Nunito, Arial'; ctx.textAlign = 'center'; ctx.fillText('Documento generado automáticamente', W/2, y+20);
ctx.fillText('Condominio Bosques del Sur 4 — ' + new Date().getFullYear(), W/2, y+38);
ctx.fillStyle = '#1E1B6E'; ctx.fillRect(0, H-8, W, 8);
try { return canvas.toDataURL('image/jpeg', 0.95); } catch(e) { console.warn('Canvas tainted on Android, using SVG fallback'); return null; }
};
const drawFallback = (ctx, cx, cy, r) => { ctx.fillStyle = '#E8E6FF'; ctx.fillRect(cx-r, cy-r, r*2, r*2); ctx.fillStyle = '#1E1B6E'; ctx.font = `bold ${r*0.7}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('CBS4', cx, cy+2); ctx.textBaseline = 'alphabetic'; };
const img = new Image(); img.crossOrigin = 'Anonymous'; img.src = LOGO_SRC; let shown = false;
const showVoucher = (fn) => {
if(shown) return; shown = true; const url = dibujarVoucher(fn || drawFallback);
if(url) mostrarVoucher(url, depto, mesStr, gc); else showToast('Error generando imagen','error');
};
img.onload = () => showVoucher((ctx, cx, cy, r) => { ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip(); ctx.drawImage(img, cx-r, cy-r, r*2, r*2); ctx.restore(); });
img.onerror = () => showVoucher(drawFallback); setTimeout(() => showVoucher(drawFallback), 1500);
}

function roundRect(ctx, x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r); ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath(); }
function sectionTitle(ctx, text, W, y) { ctx.fillStyle = '#1E1B6E'; ctx.font = 'bold 13px Nunito, Arial'; ctx.textAlign = 'left'; ctx.fillText(text.toUpperCase(), 44, y); }
function dataRow(ctx, label, value, W, y) { ctx.fillStyle = '#9090B0'; ctx.font = '12px Nunito, Arial'; ctx.textAlign = 'left'; ctx.fillText(label, 44, y); ctx.fillStyle = '#141252'; ctx.font = 'bold 14px Nunito, Arial'; ctx.textAlign = 'right'; ctx.fillText(value, W-44, y); }

r.readAsDataURL(file);

function compressImage(file, callback, quality = 0.6) {
if (!file || !file.type.match('image.*')) {
const reader = new FileReader();
reader.onload = e => callback({ name: file.name, type: file.type, data: e.target.result });
reader.readAsDataURL(file);
return;
}
const reader = new FileReader();
reader.onload = function(event) {
const img = new Image();
img.onload = function() {
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
const maxWidth = 1024;
const maxHeight = 1024;
let width = img.width;
let height = img.height;
if (width > height) {
if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
} else {
if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
}
canvas.width = width;
canvas.height = height;
ctx.drawImage(img, 0, 0, width, height);
const dataUrl = canvas.toDataURL('image/jpeg', quality);
callback({ name: file.name.replace(/\.[^/.]+$/, '.jpg'), type: 'image/jpeg', data: dataUrl });
};
img.onerror = () => {
const reader2 = new FileReader();
reader2.onload = e => callback({ name: file.name, type: file.type, data: e.target.result });
reader2.readAsDataURL(file);
};
img.src = event.target.result;
};
reader.readAsDataURL(file);
}

function readFileAsBase64(file,cb){ compressImage(file, cb); }

const deptoChart = document.getElementById('ch-deptos');
if(deptoChart){
const deptoData = MESES.map((_,i)=>{
const k=mkKey(currentYear,i);
const p=appData.pagos[k]||{};
return Object.values(p).filter(Boolean).length;
});
charts.deptos = new Chart(deptoChart,{type:'bar',data:{labels:labM,datasets:[{label:'Depto. Pagados',data:deptoData,backgroundColor:'rgba(30,27,110,0.8)',borderRadius:5}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{grid:{color:grid},ticks:{color:tick,stepSize:1}},x:{grid:{color:grid},ticks:{color:tick}}}}});
}

const l=document.getElementById('ch-line');
if(l){
const ings=MESES.map((_,i)=>{const k=mkKey(currentYear,i);const p=appData.pagos[k]||{};return Object.values(p).filter(Boolean).length*getGC(currentYear,i);});
const eg=MESES.map((_,i)=>{
const kLine = mkKey(currentYear, i);
const fijosLine = (appData.gastosFijos && appData.gastosFijos[kLine]) ? appData.gastosFijos[kLine] : [];
const f = fijosLine.reduce((s,g)=>s+g.monto,0);
const v=(appData.gastosVariables||[]).filter(g=>g.anio===currentYear&&g.mes===i).reduce((s,g)=>s+g.monto,0);
return f+v;});
charts.line=new Chart(l,{type:'line',data:{labels:labM,datasets:[{label:'Ingresos GC',data:ings,borderColor:'#4A7C59',backgroundColor:'rgba(74,124,89,0.1)',tension:0.4,fill:true},{label:'Egresos',data:eg,borderColor:'#E05252',backgroundColor:'rgba(224,82,82,0.08)',tension:0.4,fill:true}]},options:{responsive:true,...co}});
}

const rd=document.getElementById('ch-rep-dona');
if(rd){
const key=mkKey(currentYear,currentMonth);const pagos=appData.pagos[key]||{};
const pg=Object.values(pagos).filter(Boolean).length;
charts.rdona=new Chart(rd,{type:'doughnut',data:{labels:['Pagados','Pendientes'],datasets:[{data:[pg,TOTAL_DEPTOS-pg],backgroundColor:['#4A7C59','#E0A025'],borderWidth:0}]},options:{responsive:false,cutout:'72%',plugins:{legend:{display:false}}}});
}

const rb=document.getElementById('ch-rep-bar');
if(rb){
const kBar = mkKey(currentYear, currentMonth);
const fijosBar = (appData.gastosFijos && appData.gastosFijos[kBar]) ? appData.gastosFijos[kBar] : [];
const vars2=(appData.gastosVariables||[]).filter(g=>g.anio===currentYear&&g.mes===currentMonth);
charts.rbar=new Chart(rb,{type:'bar',data:{labels:[...fijosBar.map(g=>g.descripcion),...vars2.map(g=>g.descripcion)],datasets:[{data:[...fijosBar.map(g=>g.monto),...vars2.map(g=>g.monto)],backgroundColor:[...fijosBar.map(()=>dark?'rgba(107,103,212,0.8)':'rgba(30,27,110,0.8)'),...vars2.map(()=>'rgba(74,124,89,0.8)')],borderRadius:5}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{grid:{color:grid},ticks:{color:tick,callback:v=>fmt(v)}},x:{grid:{color:grid},ticks:{color:tick}}}}});
}
} catch(e) { console.error('Chart draw error:', e); }
}

function renderLoginScreen() {
const bioUser = localStorage.getItem('cbs4_biometric_enabled');
const bioArea = document.getElementById('biometric-area');
const formArea = document.getElementById('login-form-area');
const subText = document.getElementById('login-sub-text');
if (bioUser) {
bioArea.style.display = 'block';
formArea.style.display = 'none';
subText.textContent = 'Bienvenido, ' + bioUser;
} else {
bioArea.style.display = 'none';
formArea.style.display = 'block';
subText.textContent = 'Panel de Administración';
}
}

function showPasswordForm() { document.getElementById('biometric-area').style.display = 'none'; document.getElementById('login-form-area').style.display = 'block'; }

document.addEventListener('DOMContentLoaded', async () => {
document.getElementById('logo-login').src = LOGO_SRC;
document.getElementById('topbar-logo').src = LOGO_SRC;
initFirebase();

const sesionUsuario = checkSession();
if (sesionUsuario) {
state.loggedIn = true; state.isTransparencia = false;
const waitShow = setInterval(() => { if (document.getElementById('loading-overlay').style.display === 'none') { clearInterval(waitShow); showApp(); showToast('Sesión activa — bienvenido ✓','success'); } }, 200);
return;
}

const params = new URLSearchParams(window.location.search); if (params.get('vista') === 'transparencia') { enterTransparencia(); return; }

renderLoginScreen();
});
</script>
